<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICEWD - Online Terbaik Dan Terpercaya</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background-color: #0b0f05; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin-bottom: 70px; }
        .gold-gradient { background: linear-gradient(180deg, #f3d078 0%, #b38b2d 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gold { background: linear-gradient(180deg, #f3d078 0%, #b38b2d 100%); color: #000; font-weight: bold; }
        .btn-blue { background: linear-gradient(180deg, #3498db 0%, #2980b9 100%); color: #fff; font-weight: bold; }
        .sidebar-item { background: rgba(40, 40, 40, 0.8); border: 1px solid #444; transition: 0.3s; }
        .sidebar-item.active { background: linear-gradient(180deg, #e67e22 0%, #d35400 100%); border-color: #f39c12; }
        .game-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; position: relative; }
        .game-label { background: #e74c3c; color: white; text-align: center; font-size: 10px; padding: 4px 0; font-weight: bold; text-transform: uppercase; }
        .marquee-container { background: rgba(0, 255, 0, 0.1); border: 1px solid rgba(0, 255, 0, 0.3); color: #00ff00; overflow: hidden; white-space: nowrap; padding: 2px 10px; border-radius: 10px; font-size: 10px; }
        .marquee-text { display: inline-block; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        /* Slot Animation */
        .reel-spin { animation: blurSpin 0.1s infinite linear; }
        @keyframes blurSpin { 
            0% { filter: blur(0px); transform: translateY(-2px); }
            50% { filter: blur(2px); transform: translateY(2px); }
            100% { filter: blur(0px); transform: translateY(-2px); }
        }
        .jackpot-glow { box-shadow: 0 0 20px #f3d078; border-color: #f3d078 !important; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-4 flex flex-col gap-3">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-black italic tracking-tighter gold-gradient">NICEWD</h1>
            <div class="flex gap-2">
                <button class="btn-blue px-4 py-1 rounded text-sm shadow-lg">Daftar</button>
            </div>
        </div>
        <div class="flex gap-2 items-center">
            <input type="text" placeholder="Username" class="flex-1 bg-gray-800 rounded py-2 px-3 text-xs outline-none border border-gray-700">
            <input type="password" placeholder="Password" class="flex-1 bg-gray-800 rounded py-2 px-3 text-xs outline-none border border-gray-700">
            <button class="btn-gold px-4 py-2 rounded text-xs">Masuk</button>
        </div>
    </header>

    <div class="flex px-2 gap-2">
        <!-- Sidebar -->
        <aside class="w-16 flex flex-col gap-2">
            <div class="sidebar-item active flex flex-col items-center justify-center py-2 rounded-lg">
                <i class="fa fa-fire text-white text-xs mb-1"></i>
                <span class="text-[9px]">HOT</span>
            </div>
            <div class="sidebar-item flex flex-col items-center justify-center py-2 rounded-lg opacity-60">
                <i class="fa fa-gamepad text-xs mb-1"></i>
                <span class="text-[9px]">SLOT</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 pb-4">
            
            <!-- MESIN SLOT SIMULATOR -->
            <div id="slot-box" class="bg-[#1a1a1a] p-3 rounded-xl border border-yellow-600/30 mb-4 shadow-lg transition-all duration-500">
                <div class="flex justify-between items-center mb-2 px-1">
                    <div class="flex flex-col">
                        <span class="text-[9px] text-gray-400 uppercase">Saldo Anda</span>
                        <span class="text-sm font-bold text-yellow-500">Rp <span id="saldo">10.000</span></span>
                    </div>
                    <div class="marquee-container flex-1 mx-2">
                        <div class="marquee-text font-mono">Pola Gacor Hari Ini: Spin 10x Manual - Turbo 20x - Auto 50x | RTP 96.8% Locked</div>
                    </div>
                </div>
                
                <div class="flex gap-2 justify-center my-3">
                    <div id="reel1" class="w-14 h-16 bg-black rounded flex items-center justify-center text-3xl border border-gray-700">🍒</div>
                    <div id="reel2" class="w-14 h-16 bg-black rounded flex items-center justify-center text-3xl border border-gray-700">🍒</div>
                    <div id="reel3" class="w-14 h-16 bg-black rounded flex items-center justify-center text-3xl border border-gray-700">🍒</div>
                </div>

                <div class="flex gap-2">
                    <input type="number" id="betInput" value="500" class="w-1/3 bg-gray-900 text-white text-center rounded border border-gray-700 text-xs py-2">
                    <button onclick="playSlot()" id="btnSpin" class="flex-1 btn-gold rounded uppercase text-[10px] tracking-widest py-2">Spin</button>
                </div>
                <div id="message" class="text-[10px] text-center mt-2 font-bold text-gray-400 h-4">SIAP MENANG?</div>
            </div>

            <!-- Games Grid -->
            <div class="grid grid-cols-2 gap-2">
                <div class="game-card shadow-lg shadow-yellow-900/20">
                    <img src="https://unsplash.com" class="w-full h-24 object-cover">
                    <div class="game-label">MAHJONG WAYS</div>
                </div>
                <div class="game-card">
                    <img src="https://unsplash.com" class="w-full h-24 object-cover">
                    <div class="game-label">GATES OF OLYMPUS</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <div class="flex flex-col items-center"><i class="fa fa-home nav-icon text-yellow-500"></i><span class="nav-label">Home</span></div>
        <div class="flex flex-col items-center"><i class="fa fa-gift nav-icon"></i><span class="nav-label">Promosi</span></div>
        <div class="flex flex-col items-center"><i class="fa fa-comments nav-icon"></i><span class="nav-label">Live Chat</span></div>
    </nav>

    <script>
        let saldo = 10000;
        const simbols = ['🍒', '🍋', '🔔', '💎', '7️⃣'];
        const bobot =; // Peluang 2% JP 777
        const payout = { '🍒': 5, '🍋': 10, '🔔': 20, '💎': 50, '7️⃣': 100 };
        let isSpinning = false;

        // Audio Engine (Synth)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(f, t, d) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = t; osc.frequency.value = f;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + d);
        }

        function getSymbol() {
            let total = bobot.reduce((a, b) => a + b, 0);
            let r = Math.random() * total;
            let sum = 0;
            for (let i = 0; i < simbols.length; i++) {
                sum += bobot[i];
                if (r <= sum) return simbols[i];
            }
        }

        async function playSlot() {
            if (isSpinning) return;
            const bet = parseInt(document.getElementById('betInput').value);
            if (saldo < bet) {
                document.getElementById('message').innerText = "SALDO HABIS!";
                return;
            }

            isSpinning = true;
            saldo -= bet;
            document.getElementById('saldo').innerText = saldo.toLocaleString('id-ID');
            document.getElementById('message').innerText = "MENUNGGU HASIL...";
            document.getElementById('slot-box').classList.remove('jackpot-glow');

            const reels = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
            
            // Start Animasi & Suara
            reels.forEach(r => r.classList.add('reel-spin'));
            let sfx = setInterval(() => playTone(200, 'sine', 0.05), 100);

            setTimeout(() => {
                clearInterval(sfx);
                reels.forEach(r => r.classList.remove('reel-spin'));
                
                let hasil = [getSymbol(), getSymbol(), getSymbol()];
                reels.forEach((r, i) => r.innerText = hasil[i]);

                let menang = 0;
                if (hasil === hasil && hasil === hasil) {
                    menang = bet * payout[hasil];
                    document.getElementById('message').innerText = "JACKPOT! +Rp" + menang.toLocaleString('id-ID');
                    document.getElementById('message').className = "text-[10px] text-center mt-2 font-bold text-yellow-500 h-4";
                    document.getElementById('slot-box').classList.add('jackpot-glow');
                    playTone(600, 'square', 0.5);
                } else if (hasil === hasil || hasil === hasil || hasil === hasil) {
                    menang = Math.floor(bet * 1.2);
                    document.getElementById('message').innerText = "MENANG! +Rp" + menang.toLocaleString('id-ID');
                    document.getElementById('message').className = "text-[10px] text-center mt-2 font-bold text-blue-400 h-4";
                    playTone(400, 'triangle', 0.2);
                } else {
                    document.getElementById('message').innerText = "ZONK! COBA LAGI";
                    document.getElementById('message').className = "text-[10px] text-center mt-2 font-bold text-gray-500 h-4";
                }

                saldo += menang;
                document.getElementById('saldo').innerText = saldo.toLocaleString('id-ID');
                isSpinning = false;
            }, 1200);
        }
    </script>
</body>
</html>
